<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360 Property Tour - DDREMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: system-ui, sans-serif; }
    canvas { display: block; width: 100%; height: 100%; }

    #loading {
      position: fixed; inset: 0; background: #111;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; z-index: 100; gap: 16px;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid #333; border-top-color: #667eea;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #header {
      position: fixed; top: 0; left: 0; right: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      padding: 16px 24px; z-index: 20;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    #property-info { color: white; }
    #property-title { font-size: 1.2rem; font-weight: 700; }
    #property-price { font-size: 1rem; color: #a78bfa; margin-top: 2px; }
    #back-btn {
      background: rgba(255,255,255,0.15); border: none; color: white;
      padding: 8px 16px; border-radius: 20px; cursor: pointer;
      font-size: 0.85rem; transition: background 0.2s; white-space: nowrap;
    }
    #back-btn:hover { background: rgba(255,255,255,0.3); }

    #rooms-nav {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 20; flex-wrap: wrap; justify-content: center;
      padding: 0 16px;
    }
    .room-btn {
      background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.2);
      color: white; padding: 6px 14px; border-radius: 20px;
      cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
    }
    .room-btn:hover { background: rgba(102,126,234,0.6); border-color: #667eea; }
    .room-btn.active { background: #667eea; border-color: #667eea; }

    #hint {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7); color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 0.9rem; z-index: 10; pointer-events: none;
      animation: fadeout 3s forwards 1.5s;
    }
    @keyframes fadeout { to { opacity: 0; } }

    #nav {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: none; align-items: center; gap: 12px;
      background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 50px;
      color: white; z-index: 20;
    }
    #nav button {
      background: rgba(255,255,255,0.15); border: none; color: white;
      width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
      cursor: pointer; transition: background 0.2s;
    }
    #nav button:hover { background: rgba(255,255,255,0.3); }
    #nav button:disabled { opacity: 0.3; cursor: default; }
    #counter { font-size: 14px; min-width: 60px; text-align: center; }

    #no-images {
      position: fixed; inset: 0; display: none; flex-direction: column;
      align-items: center; justify-content: center; color: #888;
      background: #111; gap: 12px;
    }
    #no-images a { color: #667eea; text-decoration: none; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p id="loading-text">Loading property...</p></div>

  <div id="no-images">
    <span style="font-size:56px;opacity:0.3">&#127968;</span>
    <p>No 360&deg; images available for this property.</p>
    <a href="listings.html">&#8592; Back to listings</a>
  </div>

  <div id="header" style="display:none">
    <div id="property-info">
      <div id="property-title">Loading...</div>
      <div id="property-price"></div>
    </div>
    <button id="back-btn" onclick="window.location.href='listings.html'">&#8592; All Properties</button>
  </div>

  <div id="rooms-nav"></div>
  <div id="hint">&#128065;&#65039; Drag to look around &nbsp;|&nbsp; Scroll to zoom</div>
  <canvas id="canvas"></canvas>

  <div id="nav">
    <button id="prev">&#10094;</button>
    <span id="counter">1 / 1</span>
    <button id="next">&#10095;</button>
  </div>

  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
  <script type="module">
    import * as THREE from 'three';

    const params = new URLSearchParams(window.location.search);
    const propertyId = params.get('property');
    const API_BASE = window.location.origin;

    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loading-text');
    const noImages = document.getElementById('no-images');
    const header = document.getElementById('header');
    const roomsNav = document.getElementById('rooms-nav');
    const nav = document.getElementById('nav');
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');

    if (!propertyId) {
      window.location.href = 'listings.html';
      throw new Error('No property ID');
    }

    // Three.js setup
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 0.01);

    const geometry = new THREE.SphereGeometry(500, 60, 40);
    geometry.scale(-1, 1, 1);

    const loader = new THREE.TextureLoader();
    let mesh = null;
    let currentIdx = 0;
    let allImages = [];

    function loadImage(idx) {
      loading.classList.remove('hidden');
      loader.load(
        allImages[idx],
        (texture) => {
          if (mesh) { mesh.material.map.dispose(); mesh.material.dispose(); scene.remove(mesh); }
          mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ map: texture }));
          scene.add(mesh);
          loading.classList.add('hidden');
          counter.textContent = `${idx + 1} / ${allImages.length}`;
          prevBtn.disabled = idx === 0;
          nextBtn.disabled = idx === allImages.length - 1;
        },
        undefined,
        () => {
          if (mesh) scene.remove(mesh);
          mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: 0x1a1a2e }));
          scene.add(mesh);
          loading.classList.add('hidden');
        }
      );
    }

    // Load property data from API
    async function init() {
      try {
        loadingText.textContent = 'Loading property...';

        // Fetch property details
        const propRes = await fetch(`${API_BASE}/api/property/${propertyId}`);
        if (!propRes.ok) throw new Error('Property not found');
        const property = await propRes.json();

        document.getElementById('property-title').textContent = property.title;
        document.getElementById('property-price').textContent = property.price
          ? `$${Number(property.price).toLocaleString()}`
          : '';
        document.title = `${property.title} - 360 Tour`;
        header.style.display = 'flex';

        // Build rooms nav and image list from property.rooms
        if (property.rooms && Object.keys(property.rooms).length) {
          const rooms = property.rooms;
          Object.entries(rooms).forEach(([key, room], i) => {
            const btn = document.createElement('button');
            btn.className = 'room-btn' + (i === 0 ? ' active' : '');
            btn.textContent = room.name || key;
            btn.dataset.key = key;
            btn.onclick = () => {
              document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
              btn.classList.add('active');
              allImages = [room.image];
              currentIdx = 0;
              loadImage(0);
              nav.style.display = 'none';
            };
            roomsNav.appendChild(btn);
          });

          // Start with first room
          const firstRoom = Object.values(rooms)[0];
          allImages = [firstRoom.image];
          loadImage(0);
        } else if (property.images && property.images.length) {
          // Fallback: use flat image list
          allImages = property.images;
          loadImage(0);
          if (allImages.length > 1) nav.style.display = 'flex';
        } else {
          loading.classList.add('hidden');
          noImages.style.display = 'flex';
          return;
        }

      } catch (err) {
        loading.classList.add('hidden');
        noImages.style.display = 'flex';
        console.error('[360 Viewer]', err.message);
      }
    }

    init();

    prevBtn.onclick = () => { if (currentIdx > 0) loadImage(--currentIdx); };
    nextBtn.onclick = () => { if (currentIdx < allImages.length - 1) loadImage(++currentIdx); };

    // Mouse drag
    let isDragging = false, prevMouse = { x: 0, y: 0 }, lon = 0, lat = 0;
    canvas.addEventListener('mousedown', (e) => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
    window.addEventListener('mouseup', () => { isDragging = false; });
    canvas.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      lon -= (e.clientX - prevMouse.x) * 0.15;
      lat = Math.max(-85, Math.min(85, lat + (e.clientY - prevMouse.y) * 0.15));
      prevMouse = { x: e.clientX, y: e.clientY };
    });

    // Touch
    let prevTouch = null;
    canvas.addEventListener('touchstart', (e) => { prevTouch = e.touches[0]; }, { passive: true });
    canvas.addEventListener('touchmove', (e) => {
      if (!prevTouch) return;
      lon -= (e.touches[0].clientX - prevTouch.clientX) * 0.2;
      lat = Math.max(-85, Math.min(85, lat + (e.touches[0].clientY - prevTouch.clientY) * 0.2));
      prevTouch = e.touches[0];
    }, { passive: true });
    canvas.addEventListener('touchend', () => { prevTouch = null; });

    // Zoom
    let fov = 75;
    canvas.addEventListener('wheel', (e) => {
      fov = Math.max(30, Math.min(100, fov + e.deltaY * 0.05));
      camera.fov = fov;
      camera.updateProjectionMatrix();
    }, { passive: true });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    (function animate() {
      requestAnimationFrame(animate);
      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon);
      camera.lookAt(
        500 * Math.sin(phi) * Math.cos(theta),
        500 * Math.cos(phi),
        500 * Math.sin(phi) * Math.sin(theta)
      );
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
