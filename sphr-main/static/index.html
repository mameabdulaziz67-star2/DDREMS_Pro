<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Property Tour</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
    canvas.webgl { display: block; width: 100%; height: 100%; }
    #loading-screen {
      position: fixed; inset: 0; background: #111;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; color: white; font-family: sans-serif;
    }
    #loading-screen.hidden { display: none; }
    #loading-text-notification-percent { font-size: 2rem; font-weight: bold; margin-top: 12px; }
    #node-loading-screen {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 50; color: white; font-size: 1.2rem;
    }
    #node-loading-screen.hidden { display: none; }
    #tour-ui-buttons { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 20; }
    #tour-ui-navpoint { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20; }
  </style>
</head>
<body>
  <!-- Space data injected by server -->
  <script id="space_data" type="application/json">SPACE_DATA_PLACEHOLDER</script>

  <div id="loading-screen">
    <div>🏠 Loading 3D Tour...</div>
    <div id="loading-text-notification-percent">0%</div>
  </div>
  <div id="node-loading-screen" class="hidden">Loading...</div>
  <div id="tour-ui-buttons"></div>
  <div id="tour-ui-navpoint"></div>
  <input type="checkbox" id="autoplay" style="display:none" />
  <input type="checkbox" id="words" style="display:none" />

  <canvas class="webgl"></canvas>
</body>
</html>
